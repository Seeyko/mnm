<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#fafaf9" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MnM" />
    <title>MnM</title>
    <link rel="icon" href="/favicon.ico" sizes="48x48" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <script>
      (() => {
        const key = "mnm.theme";
        const darkThemeColor = "#2b2822";
        const lightThemeColor = "#fafaf9";
        try {
          const stored = window.localStorage.getItem(key);
          const theme = stored === "light" || stored === "dark" ? stored : "light";
          const isDark = theme === "dark";
          document.documentElement.classList.toggle("dark", isDark);
          document.documentElement.style.colorScheme = isDark ? "dark" : "light";
          const themeColorMeta = document.querySelector('meta[name="theme-color"]');
          if (themeColorMeta) {
            themeColorMeta.setAttribute("content", isDark ? darkThemeColor : lightThemeColor);
          }
        } catch {
          document.documentElement.style.colorScheme = "light";
        }
      })();
    </script>
    <style>
      body { margin: 0; padding: 0; }
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        overflow: hidden;
        background: #fafaf9;
      }
      .dark #app-loader {
        background: #1c1917;
      }
      #mnm-canvas {
        display: block;
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        font: 11px/1 monospace;
        color: #57534e;
        -webkit-user-select: none;
        user-select: none;
      }
      @media (min-width: 768px) {
        #mnm-canvas {
          font-size: 30px;
        }
      }
      .dark #mnm-canvas {
        color: #a8a29e;
      }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <pre id="mnm-canvas" aria-hidden="true"></pre>
    </div>
    <div id="root"></div>
    <script>
      window.__MNM_LOADER_START = performance.now();
      (() => {
        const LOGO_FULL = [
          "███╗   ███╗       █████╗       ███╗   ███╗",
          "████╗ ████║      ██╔══██╗      ████╗ ████║",
          "██╔████╔██║      ██║  ██║      ██╔████╔██║",
          "██║╚██╔╝██║      ██║  ██║      ██║╚██╔╝██║",
          "██║ ╚═╝ ██║      ██║  ██║      ██║ ╚═╝ ██║",
          "╚═╝     ╚═╝ake   ╚═╝  ╚═╝o     ╚═╝     ╚═╝istake",
        ];
        const LOGO_COMPACT = LOGO_FULL;
        var LOGO = LOGO_FULL;
        var LH = LOGO.length;
        var LW = Math.max(...LOGO.map(l => l.length));
        const NOISE = "░▒▓█▀▄╔╗╚╝║═╭╮╰╯│─";
        const GLYPH = [" ", ".", "·", "▪", "▫", "○"];
        const FPS = 24;
        const FRAME_MS = 1000 / FPS;
        const MIN_DISPLAY = 2200;

        const pre = document.getElementById("mnm-canvas");
        if (!pre) return;

        let dissolving = false;
        let dissolveStart = 0;

        // Called by React (main.tsx) when app is ready
        window.__dismissMnmLoader = () => {
          if (dissolving) return;
          var loader = document.getElementById("app-loader");
          if (!loader) return;
          var elapsed = performance.now() - window.__MNM_LOADER_START;
          var delay = Math.max(0, MIN_DISPLAY - elapsed);
          setTimeout(function() {
            dissolving = true;
            dissolveStart = performance.now();
            // Fallback: if render loop isn't running, just remove it
            setTimeout(function() {
              var el = document.getElementById("app-loader");
              if (el) el.remove();
            }, 2000);
          }, delay);
        };

        function measureChar() {
          const s = document.createElement("span");
          s.textContent = "M";
          s.style.cssText = "position:absolute;visibility:hidden;white-space:pre;font:inherit";
          pre.appendChild(s);
          const r = s.getBoundingClientRect();
          pre.removeChild(s);
          return { w: r.width || 7, h: r.height || 11 };
        }

        let cw, ch;
        const m0 = measureChar();
        cw = m0.w; ch = m0.h;

        let cols = 0, rows = 0, lox = 0, loy = 0;
        let logoMap = new Map();
        let tick = 0;
        let lastFrame = 0;
        const startTime = performance.now();
        const reducedMotion = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

        function resize() {
          const nc = Math.max(1, Math.floor(pre.clientWidth / cw));
          const nr = Math.max(1, Math.floor(pre.clientHeight / ch));
          if (nc === cols && nr === rows) return;
          cols = nc; rows = nr;
          lox = Math.floor((cols - LW) / 2);
          loy = Math.floor((rows - LH) / 2);
          logoMap = new Map();

          for (let r = 0; r < LH; r++) {
            const line = LOGO[r];
            for (let c = 0; c < line.length; c++) {
              const char = line[c];
              if (char === " ") continue;
              const gr = loy + r;
              const gc = lox + c;
              if (gr < 0 || gr >= rows || gc < 0 || gc >= cols) continue;
              const dx = (c - LW / 2) / LW;
              const dy = (r - LH / 2) / LH;
              const dist = Math.sqrt(dx * dx + dy * dy);
              logoMap.set(gr * cols + gc, {
                ch: char,
                dist: dist,
              });
            }
          }
        }

        function drawStatic() {
          let out = "";
          for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
              const lc = logoMap.get(r * cols + c);
              if (lc) { out += lc.ch; }
              else {
                const v = (Math.sin(c * 0.11 + r * 0.04) + Math.cos(r * 0.08 - c * 0.02)) * 0.18 + 0.22;
                out += GLYPH[Math.floor(Math.max(0, Math.min(0.999, v)) * GLYPH.length)];
              }
            }
            if (r < rows - 1) out += "\n";
          }
          pre.textContent = out;
        }

        function render(time) {
          const loader = document.getElementById("app-loader");
          if (!loader) return;
          if (time - lastFrame < FRAME_MS) { requestAnimationFrame(render); return; }

          const dt = lastFrame ? Math.min(3, (time - lastFrame) / 16.667) : 1;
          lastFrame = time;
          tick += dt;
          const elapsed = time - startTime;

          // Dissolve: fade overlay after chars dissolved
          if (dissolving) {
            const dElapsed = time - dissolveStart;
            if (dElapsed > 1100) {
              const fadeP = Math.min(1, (dElapsed - 1100) / 400);
              loader.style.opacity = String(1 - fadeP);
              if (fadeP >= 1) { loader.remove(); return; }
            }
          }

          // Ambient waves
          const colW = new Float32Array(cols);
          const rowW = new Float32Array(rows);
          for (let c = 0; c < cols; c++) colW[c] = Math.sin(c * 0.08 + tick * 0.06);
          for (let r = 0; r < rows; r++) rowW[r] = Math.cos(r * 0.1 - tick * 0.05);

          // Build output
          let out = "";
          for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
              const idx = r * cols + c;
              const lc = logoMap.get(idx);

              if (lc) {
                if (dissolving) {
                  // === DISSOLVE: edges first, center last ===
                  const dElapsed = time - dissolveStart;
                  const normDist = Math.min(1, lc.dist / 0.55);
                  const dissolveAt = (1 - normDist) * 700;
                  if (dElapsed < dissolveAt) {
                    out += lc.ch;
                  } else if (dElapsed < dissolveAt + 200) {
                    out += NOISE[Math.floor(Math.random() * NOISE.length)];
                  } else if (dElapsed < dissolveAt + 350) {
                    out += Math.random() < 0.5 ? "·" : " ";
                  } else {
                    out += " ";
                  }
                } else if (Math.random() < 0.002) {
                  // Idle shimmer
                  out += NOISE[Math.floor(Math.random() * NOISE.length)];
                } else {
                  out += lc.ch;
                }
              } else {
                const v = (colW[c] + rowW[r]) * 0.08 + 0.1;
                const clamped = Math.max(0, Math.min(0.999, v * 0.5));
                out += GLYPH[Math.floor(clamped * GLYPH.length)];
              }
            }
            if (r < rows - 1) out += "\n";
          }

          pre.textContent = out;
          requestAnimationFrame(render);
        }

        // ResizeObserver
        new ResizeObserver(() => {
          const m = measureChar();
          cw = m.w; ch = m.h;
          resize();
          if (reducedMotion) drawStatic();
        }).observe(pre);

        resize();
        if (reducedMotion) {
          drawStatic();
        } else {
          requestAnimationFrame(render);
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
