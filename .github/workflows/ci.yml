# tech-08-ci-workflow
# =============================================================================
# MnM — CI Pipeline (GitHub Actions)
# =============================================================================
# Quality Gates: QG-0 (typecheck) -> QG-1 (unit) -> QG-2 (integration) -> QG-5 (E2E)
# Architecture ref: architecture-b2b.md section 9.2
# Story: TECH-08 — CI/CD Pipeline
# =============================================================================

name: CI

on:
  push:
    branches: [master, "feature/**", "fix/**", "refactor/**"]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.15.4"

jobs:
  # =========================================================================
  # tech-08-qg0-typecheck — QG-0: TypeScript + Lint
  # =========================================================================
  qg0-typecheck:
    name: "QG-0: TypeScript & Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # tech-08-node-setup
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      # tech-08-pnpm-cache
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm typecheck

      - name: Check forbidden tokens
        run: pnpm check:tokens

  # =========================================================================
  # tech-08-qg1-unit — QG-1: Unit Tests
  # =========================================================================
  qg1-unit:
    name: "QG-1: Unit Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [qg0-typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:run

  # =========================================================================
  # tech-08-qg2-integration — QG-2: Integration Tests
  # =========================================================================
  qg2-integration:
    name: "QG-2: Integration Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [qg1-unit]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: mnm_test
          POSTGRES_PASSWORD: mnm_test
          POSTGRES_DB: mnm_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U mnm_test -d mnm_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
    env:
      DATABASE_URL: postgres://mnm_test:mnm_test@localhost:5433/mnm_test
      REDIS_URL: redis://localhost:6380
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run database migrations
        run: pnpm db:migrate

      - name: Run integration tests
        run: pnpm test:run

  # =========================================================================
  # tech-08-qg5-e2e — QG-5: E2E Tests (Playwright)
  # =========================================================================
  qg5-e2e:
    name: "QG-5: E2E Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [qg1-unit]
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: mnm_test
          POSTGRES_PASSWORD: mnm_test
          POSTGRES_DB: mnm_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U mnm_test -d mnm_test"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30
    env:
      DATABASE_URL: postgres://mnm_test:mnm_test@localhost:5433/mnm_test
      REDIS_URL: redis://localhost:6380
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # tech-08-playwright-cache
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run database migrations
        run: pnpm db:migrate

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  # =========================================================================
  # tech-08-docker-build — Docker Build Validation
  # =========================================================================
  docker-build:
    name: "Docker Build"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [qg0-typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: mnm:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
