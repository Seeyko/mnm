# tech-08-deploy-workflow
# =============================================================================
# MnM — Deploy Pipeline (GitHub Actions)
# =============================================================================
# Triggered on merge to master. Builds Docker image, tags, and deploys.
# Story: TECH-08 — CI/CD Pipeline
# =============================================================================

name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9.15.4"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # =========================================================================
  # tech-08-deploy-job — Build & Tag Docker Image
  # =========================================================================
  build-and-tag:
    name: "Build & Tag Docker Image"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # =========================================================================
  # Deploy to staging (auto on master merge)
  # =========================================================================
  deploy-staging:
    name: "Deploy to Staging"
    runs-on: ubuntu-latest
    needs: [build-and-tag]
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - name: Deploy notification
        run: |
          echo "Deploying image ${{ needs.build-and-tag.outputs.image-tag }} to staging"
          echo "Staging URL: ${{ vars.STAGING_URL }}"
          # Add actual deployment commands here (kubectl, ssh, etc.)

  # =========================================================================
  # Deploy to production (manual approval required)
  # =========================================================================
  deploy-production:
    name: "Deploy to Production"
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - name: Deploy notification
        run: |
          echo "Deploying image ${{ needs.build-and-tag.outputs.image-tag }} to production"
          echo "Production URL: ${{ vars.PRODUCTION_URL }}"
          # Add actual deployment commands here (kubectl, ssh, etc.)
