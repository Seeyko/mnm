# tech-08-dependabot-config
# =============================================================================
# MnM — Dependabot Configuration
# =============================================================================
# Automated dependency updates for npm and GitHub Actions.
# Story: TECH-08 — CI/CD Pipeline
# =============================================================================

version: 2

updates:
  # npm ecosystem (pnpm monorepo)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    reviewers:
      - "AlphaLuppi/mnm-maintainers"
    labels:
      - "dependencies"
      - "automated"
    commit-message:
      prefix: "chore(deps):"
    groups:
      typescript:
        patterns:
          - "typescript"
          - "@types/*"
      testing:
        patterns:
          - "vitest"
          - "@playwright/*"
          - "playwright"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      build:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "esbuild"
          - "tsx"

  # GitHub Actions ecosystem
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci):"
