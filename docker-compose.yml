# =============================================================================
# MnM — Docker Compose (Production)
# =============================================================================
# Full production stack: PostgreSQL + Redis + MnM server.
# Redis is internal-only (no exposed port) for security.
#
# Required env vars (set in .env or pass via -e):
#   BETTER_AUTH_SECRET   — random secret for auth sessions
#   MNM_PUBLIC_URL       — public URL of the MnM instance (optional)
#
# Usage:
#   docker compose up -d
#   docker compose down
# =============================================================================

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: mnm
      POSTGRES_PASSWORD: mnm
      POSTGRES_DB: mnm
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mnm -d mnm"]
      interval: 2s
      timeout: 5s
      retries: 30
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - redisdata:/data

  server:
    build: .
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://mnm:mnm@db:5432/mnm
      REDIS_URL: redis://redis:6379
      PORT: "3100"
      SERVE_UI: "true"
      MNM_DEPLOYMENT_MODE: "authenticated"
      MNM_DEPLOYMENT_EXPOSURE: "private"
      MNM_PUBLIC_URL: "${MNM_PUBLIC_URL:-http://localhost:3100}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
    volumes:
      - mnm-data:/mnm
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  mnm-data:
