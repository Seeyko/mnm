<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MnM - Session Monitor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="header">
    <div class="header-brand">
      <h1>MnM <span class="header-subtitle">Session Monitor</span></h1>
    </div>
    <div class="header-status">
      <span id="connection-indicator" class="indicator disconnected"></span>
      <span id="connection-text">Connecting...</span>
      <span id="last-update" class="text-muted"></span>
    </div>
  </header>

  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <h2>Sessions</h2>
        <span id="session-count" class="badge">0</span>
      </div>
      <div id="session-filters">
        <button class="filter-btn active" data-filter="active" onclick="setFilter('active')">Active</button>
        <button class="filter-btn" data-filter="all" onclick="setFilter('all')">All</button>
      </div>
      <div id="session-list"></div>
    </aside>

    <main id="detail">
      <div id="detail-empty" class="empty-state">
        <div class="empty-icon">&#9678;</div>
        <p>Select a session to view details</p>
        <p class="text-muted">Active sessions appear in the sidebar</p>
      </div>

      <div id="detail-content" class="hidden">
        <!-- Session Header -->
        <div id="session-header" class="detail-section">
          <div class="session-title-row">
            <h2 id="detail-project"></h2>
            <span id="detail-status" class="status-badge"></span>
          </div>
          <div class="session-meta">
            <span id="detail-branch" class="meta-item"></span>
            <span id="detail-messages" class="meta-item"></span>
            <span id="detail-time" class="meta-item"></span>
          </div>
          <div id="detail-prompt" class="session-prompt"></div>
          <div class="context-bar">
            <span class="context-label">Context Window</span>
            <div class="progress-bar">
              <div id="detail-context-fill" class="progress-fill"></div>
            </div>
            <span id="detail-context-pct" class="context-pct">0%</span>
          </div>
        </div>

        <!-- Current Activity -->
        <div id="section-activity" class="detail-section">
          <h3>Current Activity</h3>
          <div id="activity-text" class="activity-block"></div>
          <div id="activity-tools" class="tool-tags"></div>
        </div>

        <!-- Background Tasks -->
        <div id="section-background" class="detail-section">
          <h3>Background Processes <span id="bg-count" class="badge">0</span></h3>
          <div id="bg-task-list"></div>
        </div>

        <!-- Tasks -->
        <div id="section-tasks" class="detail-section">
          <h3>Tasks</h3>
          <div id="task-list"></div>
        </div>

        <!-- Sub-agents -->
        <div id="section-subagents" class="detail-section">
          <h3>Sub-agents <span id="subagent-count" class="badge">0</span></h3>
          <div id="subagent-list"></div>
        </div>

        <!-- Context Ingested -->
        <div id="section-context" class="detail-section">
          <h3>Context Ingested</h3>
          <div id="context-files" class="context-group"></div>
          <div id="context-urls" class="context-group"></div>
          <div id="context-searches" class="context-group"></div>
        </div>

        <!-- Agent Chat -->
        <div id="section-chat" class="detail-section hidden">
          <div class="chat-header">
            <h3>Agent Chat</h3>
            <span id="chat-agent-id" class="badge"></span>
            <button class="btn-close" onclick="closeChat()">&times;</button>
          </div>
          <div id="chat-messages" class="chat-container"></div>
        </div>
      </div>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
